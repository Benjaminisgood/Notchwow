name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Show Swift toolchain
        run: swift --version

      - name: Debug build
        run: swift build

      - name: Release build
        run: swift build -c release --product notchwow

      - name: Standard SwiftPM tests
        run: swift test

      - name: Logic smoke tests
        run: ./Scripts/test-logic.sh

      - name: Shell syntax
        run: bash -n Scripts/build_and_run.sh Scripts/install-keyoti-agent-guide.sh Scripts/package-app.sh Scripts/notarize-app.sh Scripts/test-logic.sh

      - name: Package ad hoc app
        run: APP_DIR="$RUNNER_TEMP/notchwow.app" COPY_TO_APPLICATIONS=0 ./Scripts/package-app.sh

      - name: Validate ZIP
        run: |
          ditto -c -k --sequesterRsrc --keepParent "$RUNNER_TEMP/notchwow.app" "$RUNNER_TEMP/notchwow.zip"
          unzip -t "$RUNNER_TEMP/notchwow.zip"
